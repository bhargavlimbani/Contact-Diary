name: Java CI

on:
  push:
    branches: [ dev, test, prod, main, master ]
  pull_request:
    branches: [ dev, test, prod, main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: mvn test
