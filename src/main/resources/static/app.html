<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Diary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/app.css" rel="stylesheet">
</head>
<body>

<main class="container app-shell py-4 py-md-5">
    <section id="authSection" class="auth-card card border-0 shadow-sm no-print">
        <div class="card-body p-4">
            <h1 class="h3 text-center mb-4">Contact Diary</h1>

            <div id="registerPage">
                <h2 class="h5 mb-3">Create Account</h2>
                <form id="registerForm" novalidate>
                    <input class="form-control mb-2" id="rname" placeholder="Name" required>
                    <input class="form-control mb-2" id="remail" type="email" placeholder="Email" required>
                    <input class="form-control mb-3" id="rpass" type="password" placeholder="Password" required minlength="4">
                    <button class="btn btn-primary w-100" type="submit">Register</button>
                </form>
                <p class="mt-3 mb-0 text-center">
                    Already have account?
                    <button class="btn btn-link p-0 align-baseline" type="button" onclick="showLogin()">Login</button>
                </p>
            </div>

            <div id="loginPage" style="display:none;">
                <h2 class="h5 mb-3">Login</h2>
                <form id="loginForm" novalidate>
                    <input class="form-control mb-2" id="lemail" type="email" placeholder="Email" required>
                    <input class="form-control mb-3" id="lpass" type="password" placeholder="Password" required>
                    <button class="btn btn-success w-100" type="submit">Login</button>
                </form>
                <p class="mt-3 mb-0 text-center">
                    New user?
                    <button class="btn btn-link p-0 align-baseline" type="button" onclick="showRegister()">Register</button>
                </p>
            </div>
        </div>
    </section>

    <section id="homePage" style="display:none;">
        <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-center mb-4">
            <div>
                <h1 class="h3 mb-1">My Contacts</h1>
                <p class="text-secondary mb-0" id="userInfo"></p>
            </div>
            <div class="d-flex flex-wrap gap-2 no-print">
                <button class="btn btn-outline-secondary" type="button" onclick="printContacts()">Print</button>
                <button class="btn btn-outline-primary" type="button" onclick="exportContacts()">Export CSV</button>
                <button class="btn btn-danger" type="button" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-lg-5 no-print">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h2 class="h5 mb-3" id="formTitle">Add Contact</h2>
                        <form id="contactForm" novalidate>
                            <input class="form-control mb-2" id="cname" placeholder="Name" required>
                            <input class="form-control mb-2" id="cphone" placeholder="Phone Number" maxlength="10" required>
                            <input class="form-control mb-2" id="cemail" type="email" placeholder="Email (optional)">
                            <input class="form-control mb-2" id="caddress" placeholder="Address (optional)">
                            <input class="form-control mb-3" id="crelation" placeholder="Relation (optional)">
                            <div class="d-flex gap-2">
                                <button class="btn btn-primary flex-fill" type="submit">Save Contact</button>
                                <button class="btn btn-outline-secondary" type="button" onclick="newContact()">Clear</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card border-0 shadow-sm mb-3 no-print">
                    <div class="card-body">
                        <div class="d-flex flex-wrap gap-2 mb-3">
                            <button class="btn btn-outline-primary" id="allContactsBtn" type="button" onclick="showAllContacts()">All Contact</button>
                            <button class="btn btn-outline-warning" id="favoriteContactsBtn" type="button" onclick="showFavoriteContacts()">Favorite</button>
                        </div>
                        <form id="searchForm" class="d-flex gap-2" novalidate>
                            <input class="form-control" id="searchName" placeholder="Search by name">
                            <button class="btn btn-dark" type="submit">Search</button>
                            <button class="btn btn-outline-secondary" type="button" onclick="clearSearch()">Reset</button>
                        </form>
                    </div>
                </div>

                <div id="message" class="alert d-none no-print"></div>
                <div id="list" class="row g-3"></div>
            </div>
        </div>
    </section>
</main>
<script src="js/app.js"></script>
</body>
</html>
